<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBtdoGEKuaFpKHDxtlY7w1kJLieRnzzYik",
            authDomain: "homework-website-25a85.firebaseapp.com",
            databaseURL: "https://homework-website-25a85-default-rtdb.firebaseio.com",
            projectId: "homework-website-25a85",
            storageBucket: "homework-website-25a85.firebasestorage.app",
            messagingSenderId: "10861892862",
            appId: "1:10861892862:web:88dc4bc2e45daab6af01af",
            measurementId: "G-5KHLNP5QX1"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Make Firebase available globally
        window.firebase = {
            auth,
            db,
            provider,
            signInWithPopup,
            signOut,
            onAuthStateChanged,
            collection,
            addDoc,
            getDocs,
            updateDoc,
            deleteDoc,
            doc,
            query,
            where,
            orderBy
        };
    </script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <i class="fas fa-book-open"></i>
                    Homework Tracker
                </h1>
                <div class="auth-section">
                    <button id="signin-btn" class="signin-btn">
                        <i class="fab fa-google"></i>
                        Sign in with Google
                    </button>
                    <button id="signout-btn" class="signout-btn" style="display: none;">
                        <i class="fas fa-sign-out-alt"></i>
                        Sign Out
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Login Section -->
            <div id="login-section" class="login-section">
                <div class="login-card">
                    <h2>Welcome to Homework Tracker</h2>
                    <p>Sign in with your Google account to sync your homework across all devices</p>
                    <div class="login-illustration">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <button id="login-card-signin" class="primary-btn">
                        <i class="fab fa-google"></i>
                        Sign in with Google
                    </button>
                </div>
            </div>

            <!-- App Section -->
            <div id="app-section" class="app-section" style="display: none;">
                <!-- Sidebar -->
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <h3>Classes</h3>
                        <button id="add-class-btn" class="add-btn">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                    <div class="class-list" id="class-list">
                        <div class="class-item active" data-class="all">
                            <i class="fas fa-list"></i>
                            <span>All Homework</span>
                        </div>
                    </div>
                </aside>

                <!-- Main Area -->
                <div class="main-area">
                    <!-- Toolbar -->
                    <div class="toolbar">
                        <div class="toolbar-left">
                            <h2 id="current-class">All Homework</h2>
                            <span id="homework-count">0 assignments</span>
                        </div>
                        <div class="toolbar-right">
                            <button id="add-homework-btn" class="primary-btn">
                                <i class="fas fa-plus"></i>
                                Add Homework
                            </button>
                        </div>
                    </div>

                    <!-- Homework List -->
                    <div class="homework-list" id="homework-list">
                        <div class="empty-state">
                            <i class="fas fa-clipboard-list"></i>
                            <h3>No homework yet</h3>
                            <p>Add your first homework assignment to get started</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Homework Modal -->
    <div id="homework-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Homework</h3>
                <button class="close-btn" id="close-homework-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="homework-form">
                <div class="form-group">
                    <label for="homework-title">Title</label>
                    <input type="text" id="homework-title" required>
                </div>
                <div class="form-group">
                    <label for="homework-description">Description</label>
                    <textarea id="homework-description" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="homework-class">Class</label>
                        <select id="homework-class" required>
                            <option value="">Select a class</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="homework-due-date">Due Date</label>
                        <input type="datetime-local" id="homework-due-date" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="homework-priority">Priority</label>
                    <select id="homework-priority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="secondary-btn" id="cancel-homework">Cancel</button>
                    <button type="submit" class="primary-btn">Add Homework</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Class Modal -->
    <div id="class-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Class</h3>
                <button class="close-btn" id="close-class-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="class-form">
                <div class="form-group">
                    <label for="class-name">Class Name</label>
                    <input type="text" id="class-name" required>
                </div>
                <div class="form-group">
                    <label for="class-color">Color</label>
                    <input type="color" id="class-color" value="#3b82f6">
                </div>
                <div class="modal-actions">
                    <button type="button" class="secondary-btn" id="cancel-class">Cancel</button>
                    <button type="submit" class="primary-btn">Add Class</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
